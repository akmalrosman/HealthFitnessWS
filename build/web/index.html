<!DOCTYPE html>
<html>
    <head>
        <title>Personal Health & Fitness System</title>
        <meta charset="UTF-8">
        <style>
            :root {
                --primary-color: #2C3E50;
                --accent-color: #27AE60;
                --bg-color: #F4F7F6;
                --text-color: #333;
            }
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                margin: 0;
                padding: 40px 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .container {
                background-color: white;
                width: 100%;
                max-width: 500px;
                padding: 30px 40px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            }
            h2 {
                color: var(--primary-color);
                text-align: center;
                margin-bottom: 5px;
            }
            p.subtitle {
                text-align: center;
                color: #7f8c8d;
                margin-bottom: 25px;
                font-size: 0.9em;
            }
            label {
                font-weight: 600;
                font-size: 0.9em;
                color: #555;
            }
            input[type="text"], input[type="number"] {
                width: 100%;
                padding: 12px;
                margin: 8px 0 20px 0;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
                transition: border-color 0.3s;
            }
            input[type="text"]:focus, input[type="number"]:focus {
                border-color: var(--accent-color);
                outline: none;
            }
            .radio-group {
                margin: 10px 0 20px 0;
            }
            .btn {
                background-color: var(--accent-color);
                color: white;
                padding: 14px 20px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                width: 100%;
                font-size: 1.05em;
                font-weight: bold;
                transition: background 0.3s ease;
            }
            .btn:hover {
                background-color: #219150;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Health & Fitness System</h2>
            <p class="subtitle">Please setup your profile to begin</p>
            
            <form action="UserInfoServlet" method="POST">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="" required>
                
                <label for="icNumber">IC Number (YYMMDD-XX-XXXX)</label>
                <input type="text" id="icNumber" name="icNumber" placeholder="" required>
                
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="Male" required> <label for="male" style="margin-right:15px; font-weight:normal;">Male</label>
                    <input type="radio" id="female" name="gender" value="Female"> <label for="female" style="font-weight:normal;">Female</label>
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="profileWeight">Weight (kg)</label>
                        <input type="number" step="0.1" id="profileWeight" name="weight" placeholder="e.g. 70.5" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="profileHeight">Height (cm)</label>
                        <input type="number" step="0.1" id="profileHeight" name="height" placeholder="e.g. 175" required>
                    </div>
                </div>

                <input type="submit" class="btn" value="Save Profile & Continue">
            </form>
        </div>
    </body>
</html>
